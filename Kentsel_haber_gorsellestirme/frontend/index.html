<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kocaeli Haber Haritası</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════
   DARK THEME
═══════════════════════════════════════════════════ */
:root,
[data-theme="dark"] {
  --bg:         #08111e;
  --surface:    #0f1b2d;
  --surface2:   #152236;
  --border:     #1c2f48;
  --accent:     #00d4ff;
  --accent-dim: rgba(0,212,255,.12);
  --text:       #d8e6f4;
  --muted:      #4a6880;
  --text-inv:   #000;
  --grid-line:  rgba(0,212,255,.025);
  --shadow:     rgba(0,0,0,.55);
  --danger:     #ef4444;
  --mono:       'IBM Plex Mono', monospace;
  --display:    'Syne', sans-serif;
  --body:       'Inter', sans-serif;
  --c-kaza:     #ef4444;
  --c-yangin:   #f97316;
  --c-elektrik: #facc15;
  --c-hirsiz:   #a855f7;
  --c-kultur:   #22d3ee;
}

/* ═══════════════════════════════════════════════════
   LIGHT THEME
═══════════════════════════════════════════════════ */
[data-theme="light"] {
  --bg:         #eef3fa;
  --surface:    #ffffff;
  --surface2:   #e4ecf6;
  --border:     #c5d4e8;
  --accent:     #0066cc;
  --accent-dim: rgba(0,102,204,.1);
  --text:       #1a2840;
  --muted:      #6b82a0;
  --text-inv:   #fff;
  --grid-line:  rgba(0,102,204,.04);
  --shadow:     rgba(0,30,80,.13);
  --danger:     #dc2626;
  --c-kaza:     #dc2626;
  --c-yangin:   #ea580c;
  --c-elektrik: #b45309;
  --c-hirsiz:   #7c3aed;
  --c-kultur:   #0e7490;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: background .25s, color .25s;
}

body::before {
  content:''; position:fixed; inset:0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events:none; z-index:0;
}

/* ═══════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════ */
#topbar {
  position:relative; z-index:10;
  display:flex; align-items:center; gap:10px;
  padding:0 16px; height:50px;
  background:var(--surface); border-bottom:1px solid var(--border);
  flex-shrink:0; transition:background .25s, border-color .25s;
}

.topbar-brand { display:flex; align-items:center; gap:9px; text-decoration:none; flex-shrink:0; }
.brand-icon {
  width:30px; height:30px; border-radius:7px;
  background:linear-gradient(135deg, var(--accent), #0066dd);
  display:flex; align-items:center; justify-content:center; font-size:15px;
}
.brand-text { font-family:var(--display); font-size:14px; font-weight:800; color:var(--text); letter-spacing:-.3px; }
.brand-text span { color:var(--accent); }

.topbar-spacer { flex:1; }

#news-counter {
  font-family:var(--mono); font-size:11px; color:var(--muted);
  display:flex; align-items:center; gap:5px; flex-shrink:0;
}
#news-counter strong { color:var(--accent); font-size:13px; }

#btn-theme {
  width:32px; height:32px; border-radius:7px;
  border:1px solid var(--border); background:var(--surface2);
  color:var(--text); font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s; flex-shrink:0;
}
#btn-theme:hover { border-color:var(--accent); }
#btn-theme .icon-dark  { display:inline; }
#btn-theme .icon-light { display:none;   }
[data-theme="light"] #btn-theme .icon-dark  { display:none;   }
[data-theme="light"] #btn-theme .icon-light { display:inline; }

/* ═══════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════ */
#main { position:relative; z-index:1; flex:1; display:flex; overflow:hidden; }

/* ═══════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════ */
#sidebar {
  width:310px; flex-shrink:0;
  display:flex; flex-direction:column;
  background:var(--surface); border-right:1px solid var(--border);
  overflow:hidden; transition:background .25s, border-color .25s;
  animation:fadeUp .45s ease both;
}

/* Filtre bölümü */
#filter-section {
  padding:12px 14px; border-bottom:1px solid var(--border);
  display:flex; flex-direction:column; gap:9px; flex-shrink:0;
}
.filter-row { display:flex; gap:8px; }
.filter-row .field { flex:1; display:flex; flex-direction:column; gap:4px; }

label.f-label {
  font-family:var(--mono); font-size:10px;
  color:var(--muted); letter-spacing:.1em; text-transform:uppercase;
}

select, input[type="date"] {
  width:100%; padding:7px 9px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; color:var(--text);
  font-family:var(--body); font-size:12px; outline:none;
  transition:border-color .2s, background .25s, color .25s;
  appearance:none; -webkit-appearance:none; cursor:pointer;
}
select:focus, input[type="date"]:focus { border-color:var(--accent); }
[data-theme="dark"]  input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(.4); cursor:pointer; }
[data-theme="light"] input[type="date"]::-webkit-calendar-picker-indicator { cursor:pointer; }

/* Ana aksiyon butonları — eşit büyüklükte */
.filter-actions { display:flex; gap:7px; }

#btn-load-news {
  flex:1; padding:8px 6px; border-radius:6px;
  border:1px solid var(--accent); background:var(--accent);
  color:var(--text-inv); font-family:var(--mono); font-size:11px; font-weight:600;
  cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center; gap:5px;
}
#btn-load-news:hover:not(:disabled) { background:transparent; color:var(--accent); }
#btn-load-news:disabled { opacity:.55; cursor:not-allowed; }

#btn-clear-news {
  flex:1; padding:8px 6px; border-radius:6px;
  border:1px solid var(--border); background:var(--surface2);
  color:var(--muted); font-family:var(--mono); font-size:11px;
  cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center; gap:5px;
}
#btn-clear-news:hover:not(:disabled) { border-color:var(--danger); color:var(--danger); }
#btn-clear-news:disabled { opacity:.55; cursor:not-allowed; }

#btn-reset-filters {
  width:100%; padding:5px; border:none; background:none;
  color:var(--muted); font-family:var(--mono); font-size:10px;
  cursor:pointer; text-align:center; transition:color .2s; letter-spacing:.04em;
}
#btn-reset-filters:hover { color:var(--text); }

/* Legend */
#legend-row {
  display:flex; flex-wrap:wrap; gap:5px;
  padding:9px 14px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.legend-chip {
  display:flex; align-items:center; gap:5px; padding:3px 9px;
  border-radius:20px; border:1px solid var(--border); background:var(--surface2);
  font-size:10px; font-family:var(--mono); color:var(--muted);
  cursor:pointer; transition:all .2s; user-select:none;
}
.legend-chip:hover { color:var(--text); }
.legend-chip.active {
  border-color:var(--chip-color); color:var(--chip-color);
  background:color-mix(in srgb, var(--chip-color) 12%, transparent);
}
.legend-chip .chip-dot { width:7px; height:7px; border-radius:50%; background:var(--chip-color); }

/* Haber listesi */
#news-list-wrap {
  flex:1; overflow-y:auto; padding:8px 8px 16px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.empty-state {
  padding:44px 20px 32px; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.empty-state .es-icon  { font-size:34px; }
.empty-state .es-title { font-family:var(--display); font-size:14px; font-weight:700; color:var(--text); }
.empty-state .es-sub   { font-size:11px; color:var(--muted); font-family:var(--mono); line-height:1.7; }
.no-news { padding:32px 16px; text-align:center; font-size:12px; color:var(--muted); font-family:var(--mono); }

.news-item {
  display:flex; gap:10px; padding:10px; border-radius:8px;
  border:1px solid transparent; margin-bottom:4px;
  cursor:pointer; transition:all .2s; position:relative;
}
.news-item:hover     { background:var(--surface2); border-color:var(--border); }
.news-item.active    { background:var(--surface2); border-color:var(--item-color, var(--accent)); }
.news-item.no-coords { opacity:.45; cursor:default; }
.news-item.no-coords::after {
  content:'📍?'; position:absolute; right:8px; top:8px; font-size:10px; color:var(--muted);
}
.ni-icon { font-size:19px; flex-shrink:0; margin-top:1px; }
.ni-body { flex:1; min-width:0; }
.ni-title {
  font-size:12px; font-weight:500; color:var(--text); line-height:1.4; margin-bottom:3px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.ni-meta { display:flex; gap:7px; font-size:10px; color:var(--muted); font-family:var(--mono); flex-wrap:wrap; }

#sidebar-footer {
  padding:7px 14px; border-top:1px solid var(--border);
  font-family:var(--mono); font-size:10px; color:var(--muted);
  flex-shrink:0; display:flex; justify-content:space-between; align-items:center;
}

/* ═══════════════════════════════════════════════════
   HARİTA
═══════════════════════════════════════════════════ */
#map-wrap  { flex:1; position:relative; }
#map       { width:100%; height:100%; }
#map-loading {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--bg); z-index:5; gap:12px;
  font-family:var(--mono); font-size:12px; color:var(--muted); transition:opacity .4s;
}
#map-loading.hidden { opacity:0; pointer-events:none; }
.loader-ring {
  width:36px; height:36px; border-radius:50%;
  border:2px solid var(--border); border-top-color:var(--accent);
  animation:spin .7s linear infinite;
}

/* ═══════════════════════════════════════════════════
   SCRAPING PROGRESS PANELİ
═══════════════════════════════════════════════════ */
#progress-panel {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(120px);
  z-index:500;
  width:min(380px, calc(100vw - 40px));
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px; padding:18px 20px 16px;
  box-shadow:0 16px 48px var(--shadow);
  opacity:0; pointer-events:none;
  transition:transform .35s cubic-bezier(.16,1,.3,1), opacity .3s ease;
}
#progress-panel.visible {
  transform:translateX(-50%) translateY(0);
  opacity:1; pointer-events:all;
}
.pp-header {
  display:flex; align-items:center; gap:10px; margin-bottom:14px;
}
.pp-title {
  font-family:var(--display); font-size:13px; font-weight:700; color:var(--text); flex:1;
}
.pp-spinner {
  width:16px; height:16px; border-radius:50%;
  border:2px solid var(--border); border-top-color:var(--accent);
  animation:spin .7s linear infinite; flex-shrink:0;
}
.pp-spinner.done { animation:none; border-color:#10b981; border-top-color:#10b981; }
.pp-spinner.err  { animation:none; border-color:var(--danger); border-top-color:var(--danger); }

.pp-steps { display:flex; flex-direction:column; gap:8px; }
.pp-step {
  display:flex; align-items:center; gap:10px;
  font-family:var(--mono); font-size:11px; color:var(--muted); transition:color .25s;
}
.pp-step.active { color:var(--text); }
.pp-step.done   { color:#10b981; }
.pp-step.err    { color:var(--danger); }
.step-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--border); flex-shrink:0; transition:background .25s;
}
.pp-step.active .step-dot { background:var(--accent); box-shadow:0 0 6px var(--accent); animation:pulse 1.2s ease infinite; }
.pp-step.done   .step-dot { background:#10b981; box-shadow:none; animation:none; }
.pp-step.err    .step-dot { background:var(--danger); box-shadow:none; animation:none; }

.pp-result {
  margin-top:12px; padding-top:10px; border-top:1px solid var(--border);
  font-family:var(--mono); font-size:12px; color:var(--accent);
  text-align:center; display:none;
}
.pp-result.show { display:block; }

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
#toast {
  position:fixed; bottom:24px; right:24px; z-index:999;
  padding:11px 16px; border-radius:9px;
  background:var(--surface2); border:1px solid var(--border);
  font-family:var(--mono); font-size:12px; color:var(--text);
  box-shadow:0 8px 32px var(--shadow);
  transform:translateY(70px); opacity:0;
  transition:all .3s cubic-bezier(.16,1,.3,1);
  pointer-events:none; max-width:320px;
}
#toast.show    { transform:translateY(0); opacity:1; }
#toast.success { border-color:rgba(16,185,129,.5); }
#toast.error   { border-color:rgba(239,68,68,.5);  }
#toast.info    { border-color:rgba(0,212,255,.3);  }

/* ═══════════════════════════════════════════════════
   InfoWindow
═══════════════════════════════════════════════════ */
.gm-style-iw-c {
  padding:0!important; border-radius:12px!important;
  background:#0f1b2d!important; box-shadow:0 8px 32px rgba(0,0,0,.55)!important;
}
.gm-style-iw-d { overflow:hidden!important; }
.gm-style-iw-t::after { display:none; }
.gm-ui-hover-effect > span { background:#888!important; }
.iw-wrap {
  background:#0f1b2d; border-radius:12px; overflow:hidden;
  min-width:260px; border:1px solid rgba(255,255,255,.07);
}
.iw-type   { display:flex; align-items:center; gap:8px; padding:10px 16px 0; }
.iw-emoji  { font-size:18px; }
.iw-type-label {
  font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600;
  color:var(--cfg-color,#00d4ff); text-transform:uppercase; letter-spacing:.1em;
}
.iw-title {
  padding:7px 16px 5px; font-family:'Syne',sans-serif;
  font-size:14px; font-weight:700; color:#d8e6f4; line-height:1.4;
}
.iw-meta {
  display:flex; flex-direction:column; gap:2px; padding:0 16px;
  font-family:'IBM Plex Mono',monospace; font-size:11px; color:#4a6880;
}
.iw-sources {
  padding:5px 16px 0; font-size:11px; color:#4a6880;
  display:flex; flex-wrap:wrap; gap:4px; align-items:center;
  font-family:'IBM Plex Mono',monospace;
}
.iw-src-label   { color:#2a4a6a; margin-right:4px; }
.iw-source-link { color:#00d4ff; text-decoration:none; font-size:11px; }
.iw-source-link:hover { text-decoration:underline; }
.iw-btn {
  display:block; margin:11px 16px 13px; padding:7px 14px; border-radius:7px;
  background:var(--cfg-color,#00d4ff); color:#000;
  font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600;
  text-decoration:none; text-align:center; transition:opacity .2s;
}
.iw-btn:hover { opacity:.85; }

/* ── Cluster popup ───────────────────────────────── */
.cl-wrap  { background:#0f1b2d; border-radius:12px; overflow:hidden; min-width:280px; max-width:340px; border:1px solid rgba(255,255,255,.07); }
.cl-head  { padding:10px 16px; font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; color:#00d4ff; letter-spacing:.1em; border-bottom:1px solid rgba(255,255,255,.07); }
.cl-list  { max-height:320px; overflow-y:auto; padding:4px 0; scrollbar-width:thin; scrollbar-color:#1c2f48 transparent; }
.cl-item  { display:flex; align-items:flex-start; gap:10px; padding:9px 14px; border-bottom:1px solid rgba(255,255,255,.04); transition:background .15s; }
.cl-item:last-child { border-bottom:none; }
.cl-item:hover { background:rgba(255,255,255,.04); }
.cl-emoji { font-size:16px; flex-shrink:0; margin-top:1px; }
.cl-body  { flex:1; min-width:0; }
.cl-title { font-family:'Syne',sans-serif; font-size:12px; font-weight:600; color:#d8e6f4; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.cl-meta  { font-family:'IBM Plex Mono',monospace; font-size:10px; color:#4a6880; margin-top:2px; }
.cl-link  { flex-shrink:0; color:#00d4ff; font-size:14px; text-decoration:none; padding:2px 4px; align-self:center; }
.cl-link:hover { color:#fff; }

/* ═══════════════════════════════════════════════════
   RESPONSIVE & ANIMATIONS
═══════════════════════════════════════════════════ */
@media(max-width:700px) {
  #sidebar  { width:100%; max-height:40dvh; border-right:none; border-bottom:1px solid var(--border); }
  #main     { flex-direction:column; }
  #map-wrap { flex:1; min-height:0; }
  .brand-text { display:none; }
}
@keyframes fadeUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin    { to{transform:rotate(360deg)} }
@keyframes pulse   { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
</style>
</head>
<body>

<!-- TOPBAR -->
<header id="topbar">
  <div class="topbar-brand">
    <div class="brand-icon">🗺️</div>
    <div class="brand-text">Kocaeli <span>Haber</span> Haritası</div>
  </div>
  <div class="topbar-spacer"></div>
  <div id="news-counter"><strong id="news-count">—</strong> haber</div>
  <button id="btn-theme" title="Temayı değiştir">
    <span class="icon-dark">🌙</span>
    <span class="icon-light">☀️</span>
  </button>
</header>

<!-- MAIN -->
<div id="main">

  <aside id="sidebar">
    <div id="filter-section">

      <div class="filter-row">
        <div class="field">
          <label class="f-label" for="filter-news-type">Haber Türü</label>
          <select id="filter-news-type"><option value="">Tüm Türler</option></select>
        </div>
        <div class="field">
          <label class="f-label" for="filter-district">İlçe</label>
          <select id="filter-district"><option value="">Tüm İlçeler</option></select>
        </div>
      </div>

      <div class="filter-row">
        <div class="field">
          <label class="f-label" for="filter-date-from">Başlangıç (dahil)</label>
          <input type="date" id="filter-date-from">
        </div>
        <div class="field">
          <label class="f-label" for="filter-date-to">Bitiş (dahil)</label>
          <input type="date" id="filter-date-to">
        </div>
      </div>

      <div class="filter-actions">
        <button id="btn-load-news">
          <span id="load-btn-icon">📥</span>
          <span id="load-btn-text">Haberleri Yükle</span>
        </button>
        <button id="btn-clear-news">
          <span>🗑</span>
          <span>Sıfırla</span>
        </button>
      </div>

      <button id="btn-reset-filters">↺ Filtreleri varsayılana döndür</button>
    </div>

    <div id="news-list-wrap">
      <div id="news-list">
        <div class="empty-state">
          <div class="es-icon">🗺️</div>
          <div class="es-title">Harita Hazır</div>
          <div class="es-sub">Filtreleri ayarlayın ve<br>«Haberleri Yükle» butonuna basın.</div>
        </div>
      </div>
    </div>

    <div id="sidebar-footer">
      <span id="footer-status">Hazır</span>
      <span id="footer-time">—</span>
    </div>
  </aside>

  <div id="map-wrap">
    <div id="map-loading">
      <div class="loader-ring"></div>
      <span>Harita yükleniyor…</span>
    </div>
    <div id="map"></div>
  </div>
</div>


<div id="progress-panel" role="status" aria-live="polite">
  <div class="pp-header">
    <div class="pp-spinner" id="pp-spinner"></div>
    <div class="pp-title"  id="pp-title">Haberler Yükleniyor</div>
  </div>
  <div class="pp-steps">
    <div class="pp-step" id="step-scrape">
      <div class="step-dot"></div>
      <span>Haber siteleri taranıyor (scraping)…</span>
    </div>
    <div class="pp-step" id="step-pipeline">
      <div class="step-dot"></div>
      <span>Metinler işleniyor — NLP, konum, geocoding…</span>
    </div>
    <div class="pp-step" id="step-fetch">
      <div class="step-dot"></div>
      <span>Harita ve liste güncelleniyor…</span>
    </div>
  </div>
  <div class="pp-result" id="pp-result"></div>
</div>

<div id="toast" role="alert" aria-live="polite"></div>

<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>


<script>
  window.__mapReady = function() {
    if (window.__initMapFn) {
      window.__initMapFn();
      document.getElementById("map-loading").classList.add("hidden");
      document.getElementById("footer-status").textContent = "Harita hazır";
    } else {
      window.__mapReadyPending = true;
    }
  };
</script>

<script type="module">
  import { fetchNews, fetchFilterOptions, triggerScrape, deleteAllNews } from "./js/api.js";
  import { initFilters, updateNewsCount, getCurrentFilters,
           resetFilters, onDateChange, onFilterChange } from "./js/filters.js";
  import { initMap, loadNewsOnMap, clearMarkers, setMapTheme } from "./js/map.js";

 
  const savedTheme = localStorage.getItem("kh-theme") || "dark";
  document.documentElement.setAttribute("data-theme", savedTheme);

  
  const mapReady = new Promise(resolve => {
    const originalFn = () => { initMap(savedTheme); resolve(); };
    window.__initMapFn = originalFn;
    if (window.__mapReadyPending) {
      window.__mapReadyPending = false;
      originalFn();
      document.getElementById("map-loading").classList.add("hidden");
      document.getElementById("footer-status").textContent = "Harita hazır";
    }
  });

  document.getElementById("btn-theme").addEventListener("click", () => {
    const t = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", t);
    localStorage.setItem("kh-theme", t);
    setMapTheme(t);
  });

  
  let _toastTimer;
  function showToast(msg, type = "info") {
    const el = document.getElementById("toast");
    el.textContent = msg; el.className = `show ${type}`;
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.className = "", 3800);
  }

  function setFooter(s) {
    document.getElementById("footer-status").textContent = s;
    document.getElementById("footer-time").textContent =
      new Date().toLocaleTimeString("tr-TR", { hour:"2-digit", minute:"2-digit" });
  }

  
  const pp = {
    show:  () => document.getElementById("progress-panel").classList.add("visible"),
    hide:  () => document.getElementById("progress-panel").classList.remove("visible"),
    title: (t) => { document.getElementById("pp-title").textContent = t; },
    step:  (id, state) => {
      const el = document.getElementById(id);
      if (el) el.className = `pp-step ${state}`;
    },
    spinner: (s) => {
      const el = document.getElementById("pp-spinner");
      el.className = s === "spin" ? "pp-spinner" : `pp-spinner ${s}`;
    },
    result: (text) => {
      const el = document.getElementById("pp-result");
      if (text) { el.textContent = text; el.classList.add("show"); }
      else        el.classList.remove("show");
    },
    reset: () => {
      ["step-scrape","step-pipeline","step-fetch"].forEach(id =>
        document.getElementById(id).className = "pp-step");
      document.getElementById("pp-spinner").className = "pp-spinner";
      document.getElementById("pp-result").classList.remove("show");
      pp.title("Haberler Yükleniyor");
    }
  };

  
  function showEmptyState(msg = "Filtreleri ayarlayın ve<br>«Haberleri Yükle» butonuna basın.") {
    document.getElementById("news-list").innerHTML = `
      <div class="empty-state">
        <div class="es-icon">🗺️</div>
        <div class="es-title">Harita Hazır</div>
        <div class="es-sub">${msg}</div>
      </div>`;
    updateNewsCount(0);
    clearMarkers();
  }

  
  const loadBtn  = document.getElementById("btn-load-news");
  const clearBtn = document.getElementById("btn-clear-news");

  function setBusy(val) {
    loadBtn.disabled  = val;
    clearBtn.disabled = val;
  }

  
  async function waitForScrapeFinish(pollMs = 4000, timeoutMs = 300_000) {
    const deadline = Date.now() + timeoutMs;
    return new Promise((resolve, reject) => {
      const tick = setInterval(async () => {
        if (Date.now() > deadline) {
          clearInterval(tick);
          reject(new Error("Scraping 5 dakikada tamamlanamadı — zaman aşımı."));
          return;
        }
        try {
          const r = await fetch("http://localhost:8000/api/scrape/status");
          const j = await r.json();
          if (!j.in_progress) { clearInterval(tick); resolve(); }
        } catch(_) { /* geçici ağ hatası, tekrar dene */ }
      }, pollMs);
    });
  }

  // ── ANA AKIŞ: Yükle → Scrape → Bekle → Fetch ────────
  async function handleLoad() {
    if (loadBtn.disabled) return;
    setBusy(true);
    pp.reset();
    pp.show();

    try {
      // Adım 1: Scraping başlat
      pp.step("step-scrape", "active");
      setFooter("Scraping başlatılıyor…");
      await triggerScrape();
      pp.step("step-scrape", "done");

      // Adım 2: Pipeline tamamlanana kadar bekle
      pp.step("step-pipeline", "active");
      setFooter("Haberler işleniyor…");
      await waitForScrapeFinish();
      pp.step("step-pipeline", "done");

      // Adım 3: Haberleri çek
      pp.step("step-fetch", "active");
      setFooter("Haritaya yükleniyor…");
      const data = await fetchNews(getCurrentFilters());
      loadNewsOnMap(data);
      updateNewsCount(data.length);
      pp.step("step-fetch", "done");
      pp.spinner("done");
      pp.title("Tamamlandı");
      pp.result(`✓ ${data.length} haber yüklendi`);
      setFooter(`${data.length} haber gösteriliyor`);
      setTimeout(() => pp.hide(), 2800);

    } catch(e) {
      pp.spinner("err");
      pp.title("Hata Oluştu");
      ["step-scrape","step-pipeline","step-fetch"].forEach(id => {
        if (document.getElementById(id).classList.contains("active"))
          pp.step(id, "err");
      });
      showToast("Hata: " + e.message, "error");
      setFooter("Hata oluştu");
      setTimeout(() => pp.hide(), 4500);
    } finally {
      setBusy(false);
    }
  }

  loadBtn.addEventListener("click", handleLoad);

  
  clearBtn.addEventListener("click", async () => {
    if (!window.confirm("⚠️ Tüm haberler veritabanından kalıcı olarak silinecek.\n\nEmin misiniz?"))
      return;

    setBusy(true);
    clearBtn.innerHTML = "<span>⏳</span><span>Siliniyor…</span>";
    setFooter("Siliniyor…");

    try {
      const res = await deleteAllNews();
      showEmptyState("Tüm haberler silindi.<br>Yeniden yüklemek için «Haberleri Yükle»ye basın.");
      setFooter("Veritabanı temizlendi");
      showToast(`🗑 ${res.deleted} haber silindi.`, "success");
    } catch(e) {
      showToast("Silme hatası: " + e.message, "error");
      setFooter("Silme başarısız");
    } finally {
      setBusy(false);
      clearBtn.innerHTML = "<span>🗑</span><span>Sıfırla</span>";
    }
  });

  
  await initFilters();

  
  document.getElementById("btn-reset-filters").addEventListener("click", resetFilters);

  
  onDateChange(async () => {
    try {
      const data = await fetchNews(getCurrentFilters());
      loadNewsOnMap(data);
      updateNewsCount(data.length);
      setFooter(`${data.length} haber gösteriliyor`);
    } catch(e) {
      showToast("Filtre hatası: " + e.message, "error");
    }
  });

  
  (async function autoLoadOnStartup() {
    try {
      await mapReady;

      
      setBusy(true);
      pp.reset();
      pp.show();
      pp.title("Haberler Yükleniyor");
      pp.step("step-scrape", "active");
      setFooter("Haber siteleri taranıyor…");

      try { await triggerScrape(); } catch(e) {
        
        if (!e.message.includes("409") && !e.message.includes("devam")) throw e;
      }

      pp.step("step-pipeline", "active");
      setFooter("Haberler işleniyor…");
      await waitForScrapeFinish();
      pp.step("step-scrape", "done");
      pp.step("step-pipeline", "done");

      pp.step("step-fetch", "active");
      setFooter("Haritaya yükleniyor…");
      const data = await fetchNews(getCurrentFilters());
      loadNewsOnMap(data);
      updateNewsCount(data.length);
      pp.step("step-fetch", "done");
      pp.spinner("done");
      pp.title("Tamamlandı");
      pp.result(`✓ ${data.length} haber yüklendi`);
      setFooter(`${data.length} haber gösteriliyor`);
      setTimeout(() => pp.hide(), 2800);
      setBusy(false);

    } catch(e) {
      console.warn("Startup auto-load:", e.message);
      pp.spinner("err");
      pp.title("Hata oluştu");
      setBusy(false);
      setTimeout(() => pp.hide(), 4000);
    }
  })();

  onFilterChange(async () => {
    try {
      const data = await fetchNews(getCurrentFilters());
      loadNewsOnMap(data);
      updateNewsCount(data.length);
      setFooter(`${data.length} haber gösteriliyor`);
    } catch(e) {
      showToast("Filtre hatası: " + e.message, "error");
    }
  });
</script>


<script>
  (async () => {
    let key = null;
    try {
      const r = await fetch("http://localhost:8000/api/config/maps-key");
      if (r.ok) { const j = await r.json(); key = j.key || j.maps_key || null; }
    } catch(_) {}

    if (!key) {
      document.getElementById("map-loading").innerHTML = `
        <div style="text-align:center;padding:24px;max-width:360px">
          <div style="font-size:28px;margin-bottom:10px">⚠️</div>
          <div style="color:#facc15;font-family:monospace;font-size:12px;line-height:1.8">
            Google Maps API anahtarı alınamadı.<br>
            <code style="background:#1c2f48;padding:1px 5px;border-radius:3px">/api/config/maps-key</code>
            endpoint'ini kontrol edin.
          </div>
        </div>`;
      return;
    }

    
    const s = document.createElement("script");
    s.src   = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&callback=__mapReady&loading=async`;
    s.defer = true;
    s.onerror = () => {
      document.getElementById("map-loading").innerHTML =
        `<span style="color:#ef4444;font-family:monospace;font-size:12px;padding:16px">
           ❌ Google Maps yüklenemedi. API anahtarını kontrol edin.
         </span>`;
    };
    document.head.appendChild(s);
  })();
</script>

</body>
</html>
